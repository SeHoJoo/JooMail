document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

<\u002Fdiv><div style=\"flex:1;\"><div class=\"jm-sk\" style=\"width:34%; height:11px; margin-bottom:7px;\"><\u002Fdiv><div class=\"jm-sk\" style=\"width:60%; height:10px;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- error -->\n          <div style=\"background:#fff; border:1px solid #e2e5e9; border-radius:10px; overflow:hidden;\">\n            <div style=\"padding:8px 12px; font-size:11.5px; font-weight:600; color:#9298a0; border-bottom:1px solid #eef0f2; letter-spacing:.3px;\">ERROR · 인라인 (전체화면 덮지 않음)<\u002Fdiv>\n            <div style=\"height:172px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 24px; gap:4px;\">\n              <div style=\"width:34px; height:34px; border-radius:9px; background:#fdecec; color:#d1453b; display:flex; align-items:center; justify-content:center; margin-bottom:8px;\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.3 3.5a2 2 0 0 1 3.4 0l8 13.3a2 2 0 0 1-1.7 3H4a2 2 0 0 1-1.7-3z\"><\u002Fpath><path d=\"M12 9v4\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"font-size:13.5px; font-weight:600; color:#17191c;\">메일을 불러오지 못했습니다<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:#9298a0;\">서버에 연결할 수 없습니다 (IMAP timeout)<\u002Fdiv>\n              <div style=\"margin-top:12px; display:flex; align-items:center; gap:7px; padding:6px 14px; border:1px solid #dfe2e6; border-radius:8px; font-size:12.5px; font-weight:600; color:#2b3038; cursor:pointer;\" style-hover=\"background:#f6f7f8;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\"><path d=\"M21 12a9 9 0 1 1-3-6.7\"><\u002Fpath><path d=\"M21 4v4h-4\"><\u002Fpath><\u002Fsvg>다시 시도<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- empty: no selection -->\n          <div style=\"background:#fff; border:1px solid #e2e5e9; border-radius:10px; overflow:hidden;\">\n            <div style=\"padding:8px 12px; font-size:11.5px; font-weight:600; color:#9298a0; border-bottom:1px solid #eef0f2; letter-spacing:.3px;\">EMPTY · 선택된 메일 없음 (읽기창)<\u002Fdiv>\n            <div style=\"height:172px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 24px; gap:5px;\">\n              <div style=\"width:36px; height:36px; border-radius:9px; background:#f2f3f5; color:#b6bbc2; display:flex; align-items:center; justify-content:center; margin-bottom:6px;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M3 7l9 6 9-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"font-size:13.5px; font-weight:600; color:#5b6169;\">메일을 선택하세요<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:#9298a0;\">왼쪽 목록에서 메일을 열면 여기에 표시됩니다<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- empty: empty folder -->\n          <div style=\"background:#fff; border:1px solid #e2e5e9; border-radius:10px; overflow:hidden;\">\n            <div style=\"padding:8px 12px; font-size:11.5px; font-weight:600; color:#9298a0; border-bottom:1px solid #eef0f2; letter-spacing:.3px;\">EMPTY · 빈 편지함 / 검색 0건<\u002Fdiv>\n            <div style=\"height:172px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 24px; gap:5px;\">\n              <div style=\"width:36px; height:36px; border-radius:9px; background:#f2f3f5; color:#b6bbc2; display:flex; align-items:center; justify-content:center; margin-bottom:6px;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 12h-6l-2 3h-4l-2-3H2\"><\u002Fpath><path d=\"M5.5 5.5h13L22 12v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"font-size:13.5px; font-weight:600; color:#5b6169;\">받은편지함이 비어 있습니다<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:#9298a0;\">새 메일이 도착하면 여기에 표시됩니다<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- notes -->\n      <div style=\"display:flex; flex-direction:column; gap:14px;\">\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <span style=\"background:#17191c; color:#fff; font-size:12px; font-weight:700; border-radius:5px; padding:2px 8px; font-family:ui-monospace,monospace;\">i<\u002Fspan>\n          <span style=\"font-size:14px; font-weight:600;\">레이아웃 결정 노트 · Layout notes<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width:864px; background:#fff; border:1px solid #e2e5e9; border-radius:10px; padding:22px 26px; display:grid; grid-template-columns:1fr 1fr; gap:22px 40px; font-size:13px; line-height:1.6; color:#3a3f45;\">\n          <div>\n            <div style=\"font-weight:700; color:#17191c; margin-bottom:6px;\">3-pane, 고정 밀도<\u002Fdiv>\n            사이드바(248) · 리스트(388) · 읽기창(flex). 리스트/읽기창 경계는 드래그 리사이즈 + localStorage 저장. 컴팩트 밀도 고정 — comfortable 옵션 없음(기능 최소화).\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-weight:700; color:#17191c; margin-bottom:6px;\">차분한 선택 표현<\u002Fdiv>\n            선택 = 배경색(<span style=\"color:#2d64d8;\">#eaf1fd<\u002Fspan>) + 2px 액센트 바만. 그림자·굵은 테두리 없음. 안읽음 = 좌측 dot + bold, 읽으면 즉시 해제(애니메이션 없음).\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-weight:700; color:#17191c; margin-bottom:6px;\">단일 액센트 + 뉴트럴<\u002Fdiv>\n            그레이 스케일 + 액센트 1색(<span style=\"color:#2d64d8;\">#2d64d8<\u002Fspan>)만. 시맨틱은 빨강(삭제/에러)으로 제한. 시스템 폰트, outline 아이콘 세트 통일.\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-weight:700; color:#17191c; margin-bottom:6px;\">계정 스위처 상단 고정<\u002Fdiv>\n            사이드바 최상단 = 현재 계정 + 드롭다운, 바로 아래 Compose 버튼(스크롤해도 고정). 통합 인박스 없음 — 항상 한 계정만.\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-weight:700; color:#17191c; margin-bottom:6px;\">읽기창은 파싱 결과만<\u002Fdiv>\n            MIME 파싱/charset 변환/sanitize는 백엔드(Go) 책임. 프론트는 textBody/htmlBody/attachments 렌더링만. 원격 이미지 기본 차단, 인용부 접힘.\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-weight:700; color:#17191c; margin-bottom:6px;\">모바일 = 드릴다운<\u002Fdiv>\n            폴더 → 리스트 → 읽기 단일 컬럼 네비 스택. Compose는 전체화면(FAB). 스와이프 제스처 없음 — 각 행 ⋯ 메뉴로 처리.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
